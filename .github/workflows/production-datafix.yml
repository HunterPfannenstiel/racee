name: Production Datafix

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Which datafix script to run"
        type: choice
        required: true
        options:
          - apply-race-keys
          - backfill-predictions
          - remove-dan1-data
          - run-prod-datafixes
      mode:
        description: "dry-run previews changes only; real performs the write"
        type: choice
        required: true
        options:
          - dry-run
          - real
      sha:
        description: "Exact commit SHA to run (must match what you validated in dry-run)"
        type: string
        required: true

concurrency:
  group: production-datafix
  cancel-in-progress: false

jobs:
  run-datafix:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Validate sha input
        env:
          SHA_INPUT: ${{ inputs.sha }}
        run: |
          if [[ ! "$SHA_INPUT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::sha must be a full 40-character lowercase hex commit SHA"
            exit 1
          fi

      - name: Checkout pinned commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Summarize run
        run: |
          {
            echo "### Datafix run"
            echo "- script: ${{ inputs.script }}"
            echo "- mode: ${{ inputs.mode }}"
            echo "- commit: $(git log -1 --format='%H %s (%an, %ad)' --date=short)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@56.2.0

      - name: Run datafix against production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel env run -e production -- pnpm run ${{ inputs.script }} ${{ inputs.mode == 'real' && '--yes' || '--dry-run' }}
