name: Backup Supabase

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional note for the run summary (e.g. 'pre-datafix backup')"
        type: string
        required: false
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [Preview, Production]
        default: Production
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily

concurrency:
  group: supabase-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'schedule' && 'Production' || inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-latest ships postgresql-client 16.x, but our Supabase project runs
      # Postgres 17. pg_dump refuses to dump from a server whose major version is
      # newer than its own, so pull the matching client from the official PGDG
      # (PostgreSQL Global Development Group) APT repo instead of the distro package.
      - name: Install matching PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Summarize run
        run: |
          {
            echo "### Backup run"
            echo "- trigger: ${{ github.event_name }}"
            echo "- environment: ${{ github.event_name == 'schedule' && 'Production' || inputs.environment }}"
            echo "- reason: ${{ inputs.reason || '(scheduled)' }}"
            echo "- commit: $(git log -1 --format='%H %s (%an, %ad)' --date=short)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run backup
        env:
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
          BACKUP_RETENTION: ${{ secrets.BACKUP_RETENTION }}
          DATABASE_SCHEMA: ${{ secrets.DATABASE_SCHEMA }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: pnpm run backup
